services:
  api:
    build:
      context: ../..
      dockerfile: infra/docker/api.Dockerfile
    environment:
      RESTAURANTOS_ENVIRONMENT: local
      RESTAURANTOS_SERVICE_NAME: restaurant-os-api
      RESTAURANTOS_DATABASE_URL: postgresql+psycopg://restaurantos:restaurantos@postgres:5432/restaurantos
      RESTAURANTOS_REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

  worker:
    image: python:3.12-slim
    command: ["python", "-c", "print('restaurant-os-worker placeholder')"]
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: restaurantos
      POSTGRES_USER: restaurantos
      POSTGRES_PASSWORD: restaurantos
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  postgres_data:
