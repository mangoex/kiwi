name: CI

on:
  pull_request:
  push:
    branches: ["main"]

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install API dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r apps/api/requirements-dev.txt
      - name: Run tests
        run: python -m pytest
      - name: Ruff
        run: python -m ruff check apps/api tests

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate compose
        run: docker compose -f infra/docker/docker-compose.yml config

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      - name: Install dependencies (frozen lockfile)
        run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm typecheck
      - name: Test exact MXN surcharge conversion
        run: pnpm test:ingredient-variation-money
      - name: Build Admin
        run: pnpm --filter @restaurantos/admin-web build
      - name: Build POS
        run: pnpm --filter @restaurantos/pos-web build
      - name: Build KDS
        run: pnpm --filter @restaurantos/kds-web build
